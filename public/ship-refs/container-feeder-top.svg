  <g>
    <rect x="115" y="96" width="16" height="10" fill="#4ade80"/><rect x="175" y="96" width="16" height="10" fill="#38bdf8"/>
    <rect x="195" y="96" width="16" height="10" fill="#22c55e"/><rect x="235" y="96" width="16" height="10" fill="#fb923c"/>
    <rect x="295" y="96" width="16" height="10" fill="#f87171"/><rect x="315" y="96" width="16" height="10" fill="#f97316"/>
    <rect x="355" y="96" width="16" height="10" fill="#38bdf8"/><rect x="375" y="96" width="16" height="10" fill="#fb7185"/>
  </g>
  </g>
  <g id="bridge-feeder" transform="translate(16,0) translate(71,81) scale(1.38) translate(-71,-81)" aria-hidden="true">
    <!-- מגדל: גוף כהה (עיגולים + צלחת); מרפסת קדמית בהירה בקצה ה-x הגבוה -->
    <path fill="#1a2d38" stroke="#243b4a" stroke-width="0.85"
      d="M 56.5 64 Q 54 64 54 66.5 L 54 95.5 Q 54 98 56.5 98 L 80 98 L 80 64 Z"/>
    <path fill="#d4ebf7" stroke="#1a3550" stroke-width="0.85"
      d="M 80 64 L 85.5 64 Q 88 64 88 66.5 L 88 95.5 Q 88 98 85.5 98 L 80 98 Z"/>
    <line x1="80" y1="66.2" x2="80" y2="95.8" stroke="#e0f2fe" stroke-width="1.05" stroke-linecap="round"/>
    <!-- מרפסת קדמית: שני קווי אורך — שלושה פסי חלון כמו חדר פיקוח -->
    <g stroke="#4a6272" stroke-width="0.52" stroke-linecap="round" aria-hidden="true">
      <line x1="80.4" y1="75.33" x2="87.6" y2="75.33"/>
      <line x1="80.4" y1="86.67" x2="87.6" y2="86.67"/>
    </g>
    <!-- עיגולים + צלחת + אלומה: היסט קל אחורה (‎-x) וימינה (‎+y) -->
    <g transform="translate(-4.5, 2.6)">
    <g transform="translate(71,81) rotate(90) translate(-71,-81)">
      <circle cx="71" cy="81" r="6.9" fill="none" stroke="#ffffff" stroke-width="0.55" stroke-dasharray="2 2" opacity="0.9"/>
      <circle cx="71" cy="81" r="4.35" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.45"/>
    </g>
    <g transform="translate(71,81)">
      <g class="bridgeSearchSpinCf">
        <path d="M 0 0 L 50 -28.5 L 61 0 L 50 28.5 Z" fill="url(#nvWS-cf)" filter="url(#nvFW-cf)" stroke="none" opacity="0.94"/>
        <path d="M 0 0 L 8.8 -8.8 Q 11 0 8.8 8.8 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.35"/>
      </g>
    </g>
    </g>
  </g>
  <g class="nvBeamsBreathCf" aria-hidden="true" pointer-events="none">
    <g class="nvSternSwayCf">
      <path fill="url(#nvWB-cf)" filter="url(#nvFW-cf)" d="M 32 80 L -300 62 L -300 98 Z"/>
    </g>
  </g>
  <g transform="translate(500,80)" class="nvBeamsBreathCf" aria-hidden="true" pointer-events="none">
