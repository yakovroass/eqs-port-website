      <rect x="125" y="52" width="72" height="8" fill="#94a3b8"/>
      <rect x="211" y="52" width="72" height="8" fill="#94a3b8"/>
      <rect x="297" y="52" width="72" height="8" fill="#94a3b8"/>
      <g fill="#cbd5e1">
        <rect x="198" y="28" width="7" height="110" rx="1"/><rect x="195" y="24" width="13" height="8" rx="1"/>
        <rect x="284" y="28" width="7" height="110" rx="1"/><rect x="281" y="24" width="13" height="8" rx="1"/>
        <rect x="370" y="28" width="7" height="110" rx="1"/><rect x="367" y="24" width="13" height="8" rx="1"/>
        <rect x="432" y="32" width="7" height="100" rx="1"/><rect x="429" y="28" width="13" height="8" rx="1"/>
      </g>
      <rect x="48" y="52" width="52" height="64" rx="3" fill="#f1f5f9"/>
      <rect x="54" y="56" width="40" height="22" rx="2" fill="#e2e8f0"/>
      <rect x="58" y="60" width="14" height="10" rx="1" fill="#38bdf8" opacity="0.35"/>
      <rect x="70" y="44" width="12" height="12" rx="2" fill="#b91c1c"/>
      <circle cx="528" cy="84" r="6" fill="#ca8a04"/>
    </g>
    <g class="nvBeamsBreathCf" aria-hidden="true" pointer-events="none">
      <path fill="url(#nvWB-bg)" filter="url(#nvFW-bg)" d="M 32 80 L -515 62 L -515 98 Z"/>
      <path fill="url(#nvWS-bg)" filter="url(#nvFW-bg)" d="M 488 80 L 1035 62 L 1035 98 Z"/>
    </g>
  </g>
  <g aria-hidden="true" pointer-events="none">
    <circle class="nvPortCf" cx="183" cy="118" r="11" fill="url(#nvRP-bg)" filter="url(#nvFC-bg)"/>
    <circle class="nvStbdCf" cx="183" cy="42" r="11" fill="url(#nvSG-bg)" filter="url(#nvFC-bg)"/>
  </g>
</svg>
