    <rect x="355" y="68" width="16" height="10" fill="#4ade80"/>
  </g>
  <g>
    <rect x="135" y="82" width="16" height="10" fill="#38bdf8"/><rect x="175" y="82" width="16" height="10" fill="#fb7185"/>
