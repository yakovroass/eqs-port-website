    <rect x="295" y="82" width="16" height="10" fill="#f97316"/><rect x="335" y="82" width="16" height="10" fill="#22c55e"/>
    <rect x="355" y="82" width="16" height="10" fill="#fb923c"/><rect x="375" y="82" width="16" height="10" fill="#60a5fa"/>
