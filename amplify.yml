# AWS Amplify build spec for Next.js (SSR / standalone)
# See: https://docs.aws.amazon.com/amplify/latest/userguide/deploy-nextjs-app.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - 'test -n "$DATABASE_URL" || (echo "Amplify env: set DATABASE_URL to a PostgreSQL URL (e.g. Neon)" && exit 1)'
        - npx prisma migrate deploy
        - 'npm run db:seed'
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*