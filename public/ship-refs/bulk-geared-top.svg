<svg xmlns="http://www.w3.org/2000/svg" viewBox="-520 -95 1580 330" width="1580" height="330" aria-label="Bulk carrier geared">
  <defs>
    <style type="text/css"><![CDATA[
      @keyframes navBlinkCf {
        0%, 42% { opacity: 1; }
        54%, 91% { opacity: 0.07; }
        100% { opacity: 1; }
      }
      .nvPortCf { animation: navBlinkCf 4.4s ease-in-out infinite; animation-delay: 0s; }
      .nvStbdCf { animation: navBlinkCf 4.4s ease-in-out infinite; animation-delay: 2.2s; }
      @keyframes beamBreathCf {
        0%, 100% { opacity: 0.96; }
        50% { opacity: 0.86; }
      }
      .nvBeamsBreathCf { animation: beamBreathCf 8.5s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .nvBeamsBreathCf { animation: none; opacity: 0.92; }
      }
    ]]></style>
    <linearGradient id="nvWB-bg" gradientUnits="userSpaceOnUse" x1="32" y1="80" x2="-520" y2="80">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="18%" stop-color="#fef9c3" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#fefce8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nvWS-bg" gradientUnits="userSpaceOnUse" x1="488" y1="80" x2="1040" y2="80">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="18%" stop-color="#fef9c3" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#fefce8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nvRP-bg" gradientUnits="userSpaceOnUse" cx="183" cy="118" r="24">
      <stop offset="0%" stop-color="#fecaca" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ef4444" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvSG-bg" gradientUnits="userSpaceOnUse" cx="183" cy="42" r="24">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#22c55e" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="nvFW-bg" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nvFC-bg" x="-130%" y="-130%" width="360%" height="360%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hullHaloSoft-bg" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(260,0) scale(-1,1) translate(-260,0)">
    <g filter="url(#hullHaloSoft-bg)" opacity="0.88" aria-hidden="true">
