    </g>
  </g>
  </g>
  <g aria-hidden="true" pointer-events="none">
    <circle class="nvPortCf" cx="183" cy="118" r="11" fill="url(#nvRP-cf)" filter="url(#nvFC-cf)"/>
    <circle class="nvStbdCf" cx="183" cy="42" r="11" fill="url(#nvSG-cf)" filter="url(#nvFC-cf)"/>
  </g>
</svg>
