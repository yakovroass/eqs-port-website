<svg xmlns="http://www.w3.org/2000/svg" viewBox="-520 -95 1580 330" width="1580" height="330" aria-label="Fast ferry">
  <defs>
    <style type="text/css"><![CDATA[
      @keyframes navBlinkCf {
        0%, 42% { opacity: 1; }
        54%, 91% { opacity: 0.07; }
        100% { opacity: 1; }
      }
      .nvPortCf { animation: navBlinkCf 4.4s ease-in-out infinite; animation-delay: 0s; }
      .nvStbdCf { animation: navBlinkCf 4.4s ease-in-out infinite; animation-delay: 2.2s; }
      @keyframes beamBreathCf {
        0%, 100% { opacity: 0.96; }
        50% { opacity: 0.86; }
      }
      .nvBeamsBreathCf { animation: beamBreathCf 8.5s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .nvBeamsBreathCf { animation: none; opacity: 0.92; }
      }
    ]]></style>
    <linearGradient id="nvWB-ff" gradientUnits="userSpaceOnUse" x1="32" y1="80" x2="-520" y2="80">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="18%" stop-color="#fef9c3" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#fefce8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nvWS-ff" gradientUnits="userSpaceOnUse" x1="488" y1="80" x2="1040" y2="80">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="18%" stop-color="#fef9c3" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#fefce8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nvRP-ff" gradientUnits="userSpaceOnUse" cx="183" cy="118" r="24">
      <stop offset="0%" stop-color="#fecaca" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#ef4444" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvSG-ff" gradientUnits="userSpaceOnUse" cx="183" cy="42" r="24">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#22c55e" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="nvFW-ff" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nvFC-ff" x="-130%" y="-130%" width="360%" height="360%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hullHaloSoft-ff" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(260,0) scale(-1,1) translate(-260,0)">
    <g filter="url(#hullHaloSoft-ff)" opacity="0.88" aria-hidden="true">
      <ellipse cx="260" cy="80" rx="395" ry="86" fill="#00a8ff" opacity="0.09"/>
      <ellipse cx="260" cy="80" rx="315" ry="68" fill="#64748b" opacity="0.075"/>
      <ellipse cx="260" cy="80" rx="240" ry="52" fill="#94a3b8" opacity="0.055"/>
    </g>
    <g transform="translate(260,80) scale(1.08) translate(-218,-78)">
      <path fill="#5c7d95" d="M 24 78 L 32 48 L 44 40 L 160 34 L 360 40 L 400 56 L 412 78 L 400 100 L 360 116 L 160 122 L 44 116 L 32 108 L 24 78 Z"/>
      <rect x="100" y="48" width="260" height="60" rx="2" fill="#2d4554" opacity="0.55"/>
      <rect x="120" y="58" width="70" height="40" rx="2" fill="#e8eef4"/>
      <rect x="200" y="62" width="140" height="14" rx="1" fill="#7dd3fc" opacity="0.5"/>
      <rect x="200" y="80" width="140" height="14" rx="1" fill="#fcd34d" opacity="0.55"/>
      <rect x="48" y="52" width="40" height="52" rx="2" fill="#e8eef4"/>
    </g>
    <g class="nvBeamsBreathCf" aria-hidden="true" pointer-events="none">
      <path fill="url(#nvWB-ff)" filter="url(#nvFW-ff)" d="M 32 80 L -515 62 L -515 98 Z"/>
      <path fill="url(#nvWS-ff)" filter="url(#nvFW-ff)" d="M 488 80 L 1035 62 L 1035 98 Z"/>
    </g>
  </g>
  <g aria-hidden="true" pointer-events="none">
    <circle class="nvPortCf" cx="183" cy="118" r="11" fill="url(#nvRP-ff)" filter="url(#nvFC-ff)"/>
    <circle class="nvStbdCf" cx="183" cy="42" r="11" fill="url(#nvSG-ff)" filter="url(#nvFC-ff)"/>
  </g>
</svg>
